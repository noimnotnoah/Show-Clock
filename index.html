<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#05070d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

.clock{
    text-align:center;
}

#time{
    font-size:min(12vw,180px);
    font-weight:bold;
    color:#ff0000;
    user-select:none;
}

#date{
    margin-top:20px;
    font-size:min(3vw,40px);
    color:#cccccc;
    user-select:none;
    display:none;
}

#colourPicker{
    position:fixed;
    top:20px;
    right:20px;
    width:80px;
    height:80px;
    border:none;
    background:none;
    display:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="clock">
    <div id="time">00:00:00.000</div>
    <div id="date"></div>
</div>

<input type="color" id="colourPicker" value="#ff0000">

<script>

const time = document.getElementById("time");
const date = document.getElementById("date");
const picker = document.getElementById("colourPicker");

let dateVisible = false;
let pickerVisible = false;

function updateClock(){

    const now = new Date();

    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    const ms = String(now.getMilliseconds()).padStart(3,"0");

    time.textContent = `${h}:${m}:${s}.${ms}`;

    date.textContent = now.toLocaleDateString("en-GB",{
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });

    requestAnimationFrame(updateClock);
}

updateClock();

picker.addEventListener("input", () => {
    time.style.color = picker.value;
});

document.addEventListener("keydown",(e)=>{

    switch(e.key.toLowerCase()){

        case "d":
            dateVisible = !dateVisible;
            date.style.display = dateVisible ? "block" : "none";
            break;

        case "c":
            pickerVisible = !pickerVisible;
            picker.style.display = pickerVisible ? "block" : "none";
            break;
    }

});

</script>

</body>
</html>
