<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen UK Clock</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap");

    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #05070d;
      color: #e9f2ff;
      font-family: "Space Grotesk", sans-serif;
      overflow: hidden;
    }

    /* Clock Styles */
    .clock { text-align: center; line-height: 1.1; letter-spacing: 0.05em; }
    .time { font-size: clamp(3rem, 12vw, 12rem); font-weight: 700; color: #74f0ed; text-shadow: 0 0 24px rgba(116, 240, 237, 0.25); }
    .date { margin-top: 1rem; font-size: clamp(1.2rem, 3vw, 3rem); color: #8ba6c1; }

    /* Game Overlay */
    #gameScreen {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    #snakeCanvas {
      border: 2px solid #74f0ed;
      background: #000;
      box-shadow: 0 0 20px rgba(116, 240, 237, 0.2);
    }
    .game-info { color: #74f0ed; margin-bottom: 10px; font-size: 1.5rem; }

    /* Existing Controls Styles (Simplified for brevity) */
    .controls, .mode-toggle { position: fixed; top: 1rem; background: rgba(0, 0, 0, 0.65); padding: 0.6rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .controls { right: 1rem; }
    .mode-toggle { left: 1rem; cursor: pointer; color: white; }
  </style>
</head>
<body class="theme-neon">

  <button class="mode-toggle" id="modeToggle">Switch to Countdown</button>
  <div class="controls">
    <label>Theme:</label>
    <select id="theme">
      <option value="theme-neon">Neon Aqua</option>
      <option value="theme-bw">Black & White</option>
    </select>
  </div>

  <div class="clock">
    <div class="time" id="time">00:00:00</div>
    <div class="date" id="date">London Time</div>
  </div>

  <!-- Hidden Game Screen -->
  <div id="gameScreen">
    <div class="game-info">Score: <span id="score">0</span> | Press ESC to Exit</div>
    <canvas id="snakeCanvas" width="400" height="400"></canvas>
  </div>

  <script>
    // --- CLOCK LOGIC ---
    function updateClock() {
      const now = new Date();
      timeEl.innerText = now.toLocaleTimeString('en-GB');
      dateEl.innerText = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");
    setInterval(updateClock, 1000);
    updateClock();

    // --- SECRET TRIGGER (123) ---
    let inputBuffer = "";
    window.addEventListener("keydown", (e) => {
      inputBuffer += e.key;
      if (inputBuffer.endsWith("123")) {
        openGame();
        inputBuffer = "";
      }
      if (e.key === "Escape") closeGame();
      setTimeout(() => { if(inputBuffer.length > 0) inputBuffer = ""; }, 2000);
    });

    // --- SNAKE GAME LOGIC ---
    const canvas = document.getElementById("snakeCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    let score = 0;
    let snake, food, dx, dy, gameInterval;

    function openGame() {
      document.getElementById("gameScreen").style.display = "flex";
      resetGame();
      gameInterval = setInterval(gameLoop, 100);
    }

    function closeGame() {
      document.getElementById("gameScreen").style.display = "none";
      clearInterval(gameInterval);
    }

    function resetGame() {
      snake = [{x: 200, y: 200}, {x: 190, y: 200}, {x: 180, y: 200}];
      food = {x: 100, y: 100};
      dx = 10; dy = 0; score = 0;
      scoreEl.innerText = score;
    }

    function gameLoop() {
      if (didGameEnd()) { resetGame(); return; }
      
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Move Snake
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head);
      
      if (head.x === food.x && head.y === food.y) {
        score += 10; scoreEl.innerText = score;
        food = {x: Math.floor(Math.random()*39)*10, y: Math.floor(Math.random()*39)*10};
      } else {
        snake.pop();
      }

      // Draw Food
      ctx.fillStyle = "red";
      ctx.fillRect(food.x, food.y, 10, 10);
      
      // Draw Snake
      ctx.fillStyle = "#74f0ed";
      snake.forEach(part => ctx.fillRect(part.x, part.y, 10, 10));
    }

    function didGameEnd() {
      const head = snake[0];
      const hitWall = head.x < 0 || head.x >= 400 || head.y < 0 || head.y >= 400;
      const hitSelf = snake.slice(1).some(p => p.x === head.x && p.y === head.y);
      return hitWall || hitSelf;
    }

    window.addEventListener("keydown", e => {
      if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -10; }
      if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 10; }
      if (e.key === "ArrowLeft" && dx === 0) { dx = -10; dy = 0; }
      if (e.key === "ArrowRight" && dx === 0) { dx = 10; dy = 0; }
    });
  </script>
</body>
</html>
